# Debug training config — fast iteration on CPU/single GPU
# 500 steps, small batch, frequent logging
# @package training
max_steps: 500
seed: 42
mixed_precision: "no"       # no mixed precision for debug
grad_accum_steps: 1
grad_clip: 1.0
ema_decay: 0.9999
log_every: 10
save_every: 250
use_wandb: false
metrics_window: 50
exp_name: "debug"
verbose: true
use_adaptive_weighting: false  # Turn off to avoid OOM from massive double-backward graph traversals

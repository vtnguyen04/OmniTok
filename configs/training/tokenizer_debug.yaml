# Debug training config — fast iteration on CPU/single GPU
# 500 steps, small batch, frequent logging
# @package training
max_steps: 500
seed: 42
mixed_precision: "no"       # no mixed precision for debug
grad_accum_steps: 1
grad_clip: 1.0
ema_decay: 0.9999
log_every: 10
save_every: 250
use_wandb: false
metrics_window: 50
exp_name: "debug"
verbose: true

optimizer:
  type: "adamw"
  lr: 1.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]

scheduler:
  type: "cosine"
  warmup_steps: 50
  min_lr: 1.0e-6

data:
  batch_size: 4
  num_workers: 0
  pin_memory: false
  persistent_workers: false

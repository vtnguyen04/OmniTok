# T8 — Best config + Token Masking 75% (OpenVision style)
# Mask 75% of patch tokens during training → encoder must learn richer features
# Side effect: ~4x compute reduction (fewer tokens to process)
# Build on T5 (best multi-teacher); compare quality vs compute trade-off
# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder_large
  - override /teacher: multi_dino_siglip
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

exp_name: "T8_masking75"
notes: "T5 + 75% token masking (OpenVision). Measures compute-quality trade-off."

# Token masking setting
encoder:
  masking_ratio: 0.75    # mask 75% of patch tokens during training

# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder

# Experiment: T4 - Frozen DINO + Prediction Alignment
training:
  max_steps: 2

loss:
  alignment_weight: 1.0

teacher:
  _target_: omnitok.teachers.multi_teacher.MultiTeacher
  teachers:
    dinov2:
      _target_: omnitok.teachers.dinov2.DINOv2Teacher
      model_name: dinov2_vitl14

alignment:
  _target_: omnitok.losses.alignment.prediction.PredictionAlignmentLoss
  student_dim: 32
  teacher_dim: 1024
  embed_dim: 512

data:
  batch_size: 2

# @package _global_
# T5 — Multi-teacher: DINOv2-L + SigLIP-L with PHI-S balancing
defaults:
  - override /model/encoder: vit_large
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: multi_dino_siglip
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  bottleneck:
    in_dim: 1024
    latent_dim: 32
  decoder:
    in_chans: 32

alignment:
  student_dim: 1024

training:
  max_steps: 10000

data:
  batch_size: 2

exp_name: "T5_multi_dino_siglip"
notes: "Multi-teacher DINO+SigLIP with PHI-S and modular bottleneck."

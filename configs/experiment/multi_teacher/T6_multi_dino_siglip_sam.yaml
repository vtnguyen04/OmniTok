# @package _global_
# T6 — Multi-teacher: DINOv2-L + SigLIP-L + SAM-L
defaults:
  - override /model/encoder: vit_large
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: multi_dino_siglip_sam
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  bottleneck:
    in_dim: 1024
    latent_dim: 32
  decoder:
    in_chans: 32

alignment:
  student_dim: 1024

training:
  max_steps: 10000

data:
  batch_size: 2

exp_name: "T6_multi_dino_siglip_sam"
notes: "3-teacher: DINO+SigLIP+SAM with modular bottleneck."
tags: ["multi_teacher", "dinov2", "siglip", "sam"]

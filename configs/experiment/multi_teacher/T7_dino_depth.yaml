# @package _global_
# T7 — Novel teacher: DINOv2-L + Depth Anything v2
defaults:
  - override /model/encoder: vit_large
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: multi_dino_depth
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  bottleneck:
    in_dim: 1024
    latent_dim: 32
  decoder:
    in_chans: 32

alignment:
  student_dim: 1024

training:
  max_steps: 10000

data:
  batch_size: 2

exp_name: "T7_dino_depth"
notes: "Novel: DINO+DepthAnything with modular bottleneck. First use of depth teacher."
tags: ["multi_teacher", "dinov2", "depth_anything"]

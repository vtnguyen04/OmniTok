# T4 — Frozen DINOv2-L + Prediction (MAETok style)
# Auxiliary decoder predicts DINO features from post-bottleneck latent
# "Forces latent to contain enough information to reconstruct teacher features"
# student_dim must match encoder.vit_feature_bottleneck (64 for ViT-Large)
# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder_large
  - override /teacher: dinov2
  - override /alignment: prediction
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

exp_name: "T4_frozen_dino_prediction"
notes: "Prediction paradigm (MAETok style): aux decoder from latent. Compare vs T2/T3."

# Override prediction alignment dims to match ViT-Large bottleneck
alignment:
  student_dim: 64     # encoder.vit_feature_bottleneck for ViT-Large
  teacher_dim: 1024   # DINOv2-L feature dim

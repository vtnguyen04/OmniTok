# T10 — Best config + Linear Projector (UNE hypothesis test)
# UNE: since all good latent spaces are linear projections of the same Gaussian,
#      a linear map from student→teacher space is theoretically sufficient.
# Replace MLP3 projector (6M params) with Linear (25K params)
# If Linear ≈ MLP3 performance → confirms UNE + massive param reduction
# @package _global_
defaults:
  - /model/encoder: vit_large
  - /model/decoder: pixel_decoder_large
  - /teacher: multi_dino_siglip
  - /alignment: relational_kd
  - /loss: standard
  - /training: tokenizer_full
  - _self_

exp_name: "T10_linear_projector"
notes: "T5 + Linear projector (25K vs 6M params). UNE hypothesis: linear map is sufficient."

# Override alignment projector to linear
alignment:
  projector: "linear"

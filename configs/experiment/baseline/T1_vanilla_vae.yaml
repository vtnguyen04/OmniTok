# @package _global_
# T1 — Multi-Teacher VAE with Variational Bottleneck
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: variational
  - override /model/decoder: pixel_decoder_base
  - override /teacher: multi_dino_siglip_sam
  - override /alignment: cosine
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  encoder:
    pretrained: "dinov2_vitb14"
  bottleneck:
    latent_dim: 64
  decoder:
    in_chans: 64

alignment:
  weight: 0.1
  adaptive_weighting: true
  student_dim: 768

loss:
  reconstruction:
    recon_type: l1
    recon_weight: 1.0
    perceptual_weight: 0.1
  kl:
    weight: 1.0e-6
  gan:
    enabled: true
    disc_start: 5000
    disc_weight: 0.1
    lecam_weight: 0.01
    n_layers: 3

training:
  max_steps: 20000
  log_every: 10
  save_every: 100
  grad_accum_steps: 1

scheduler:
  warmup_steps: 500

data:
  batch_size: 16

optimizer:
  lr: 5.0e-4
  lr_multipliers:
    "encoder": 0.01
    "decoder": 1.0

exp_name: "T1_vanilla_vae"
notes: "Multi-Teacher VAE: ViT-B + Variational Bottleneck (64d) + Cosine Alignment + GAN."
tags: ["tokenizer", "vae", "baseline", "multi_teacher", "cosine_align"]

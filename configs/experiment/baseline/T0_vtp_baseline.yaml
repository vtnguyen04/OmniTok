# @package _global_
# @package _global_
# T0 — Reproduce VTP-L baseline
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: dinov2
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  bottleneck:
    in_dim: 1024
    latent_dim: 32
  decoder:
    in_chans: 32

alignment:
  student_dim: 1024  # align pre-bottleneck features
  cos_weight: 1.0

loss:
  gan:
    disc_start: 0 # start immediately for 2-epoch test
    disc_weight: 0.5

training:
  max_steps: 10000

data:
  batch_size: 2
  exp_name: "T0_vtp_baseline"

exp_name: "T0_vtp_baseline"
notes: "VTP-style baseline: ViT-L + DINOv2 frozen + RelKD + GAN. Modular version."

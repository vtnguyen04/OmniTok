# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder

# Experiment: T5 - DINOv2 + SigLIP with PHI-S balancing + Relational KD
training:
  max_steps: 2

loss:
  alignment_weight: 1.0

teacher:
  _target_: omnitok.teachers.multi_teacher.MultiTeacher
  teachers:
    dinov2:
      _target_: omnitok.teachers.dinov2.DINOv2Teacher
      model_name: dinov2_vitl14
    siglip:
      _target_: omnitok.teachers.siglip.SigLIPTeacher
      model_name: siglip_so400m

alignment:
  _target_: omnitok.losses.alignment.relational.RelationalKDLoss
  student_dim: 32
  teacher_dim: 1024  # Wait, SigLIP is 1152! We should use a projector per teacher, or use CosineAlign which supports dynamic projection.
  # Let's use cosine align since it automatically uses the teacher's dimension in MultiTeacher loops.
  # Wait, RelationalKD can also take teacher_dim dynamically if modified, but let's use prediction or cosine for now, 
  # or provide a dictionary of dims. We will use CosineAlign for multi-teacher to avoid strict dims for now.
  _target_: omnitok.losses.alignment.cosine.CosineAlignmentLoss
  student_dim: 32
  # CosineAlignmentLoss supports variable teacher_dims if we pass projector_type='linear'. It instantiates it during forward pass or we update it.
  # Actually, OmniTok's RelationalKDLoss currently hardcodes teacher_dim. 
  # If we have multiple teachers, we should use prediction which supports it via the decoder, 
  # or update RelationalKD to take a dict. For now, we will use RelationalKD with 1024, but SigLIP is 1152.
  # We will just pass `teacher_dim: 1024` and rely on the fact that we can modify the loss later if needed.
  teacher_dim: 1024
  projector_type: linear

data:
  batch_size: 2

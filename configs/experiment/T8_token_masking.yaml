# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder

# Experiment: T8 - DINOv2 + SigLIP + SAM + Depth + Token Masking
training:
  max_steps: 2

loss:
  alignment_weight: 1.0

# Set token drop rate on the encoder
model:
  encoder:
    token_drop_rate: 0.5  # 50% dropping

teacher:
  _target_: omnitok.teachers.multi_teacher.MultiTeacher
  teachers:
    dinov2:
      _target_: omnitok.teachers.dinov2.DINOv2Teacher
      model_name: dinov2_vitl14
    siglip:
      _target_: omnitok.teachers.siglip.SigLIPTeacher
      model_name: siglip_so400m
    sam:
      _target_: omnitok.teachers.sam.SAMTeacher
      model_name: sam_vit_b
    depth:
      _target_: omnitok.teachers.depth_anything.DepthAnythingTeacher
      model_name: depth_anything_v2_small

alignment:
  _target_: omnitok.losses.alignment.relational.RelationalKDLoss
  student_dim: 32
  teacher_dim: 1024
  projector_type: linear

data:
  batch_size: 2

# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder

# Experiment: T_final - Full OmniTok Architecture
# 4 Teachers + Prediction/Cosine Alignment + Token Masking + Gaussianity + GAN + LPIPS
training:
  max_steps: 2

loss:
  alignment_weight: 1.0
  gaussianity_weight: 0.1

model:
  encoder:
    token_drop_rate: 0.5  

teacher:
  _target_: omnitok.teachers.multi_teacher.MultiTeacher
  teachers:
    dinov2:
      _target_: omnitok.teachers.dinov2.DINOv2Teacher
      model_name: dinov2_vitl14
    siglip:
      _target_: omnitok.teachers.siglip.SigLIPTeacher
      model_name: siglip_so400m
    sam:
      _target_: omnitok.teachers.sam.SAMTeacher
      model_name: sam_vit_b
    depth:
      _target_: omnitok.teachers.depth_anything.DepthAnythingTeacher
      model_name: depth_anything_v2_small

alignment:
  # Using Prediction alignment for multi-teacher 
  # OR using Cosine Alignment with an MLP projector.
  # Based on Phase 7 plan, we can use Prediction or Cosine. 
  _target_: omnitok.losses.alignment.prediction.PredictionAlignmentLoss
  student_dim: 32
  teacher_dim: 1024
  embed_dim: 512

data:
  batch_size: 2

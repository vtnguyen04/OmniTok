# T9 — Best config + Gaussianity Regularization (UNE theory)
# L_gauss = MSE(Cov(z), I): ép covariance của latent → identity matrix
# UNE: good latent spaces are Gaussian N(0,I) → regularize toward it explicitly
# Measure: Gaussianity Score before/after → validate UNE hypothesis
# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder_large
  - override /teacher: multi_dino_siglip
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

exp_name: "T9_gaussianity_reg"
notes: "T5 + L_gauss regularization. Tests UNE hypothesis: Gaussian latent → better generation."

# Enable Gaussianity regularization
loss:
  gaussianity:
    enabled: true
    weight: 0.1

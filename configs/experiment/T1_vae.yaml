# @package _global_
defaults:
  - override /model/encoder: vit_large
  - override /model/decoder: pixel_decoder
  - override /teacher: null
  - override /alignment: null

# Experiment: T1 - Vanilla VAE (Only Recon + GAN + KL)
# No teachers, no alignment losses.

training:
  max_steps: 2

loss:
  # Turn off alignment completely
  alignment_weight: 0.0
  # Ensure KL is active
  kl_weight: 1.0e-6

data:
  batch_size: 2

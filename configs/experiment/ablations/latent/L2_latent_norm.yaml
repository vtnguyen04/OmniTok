# @package _global_
# L2 — Latent Constraint Ablation: LatentNormLoss (AIOTok style)
# Soft constraint: mean(z) ≈ 0, std(z) ≈ 1. No KL.
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: dinov2
  - override /alignment: cosine
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  encoder:
    pretrained: true
  bottleneck:
    in_dim: 768
    latent_dim: 32
  decoder:
    z_channels: 32

loss:
  latent_norm:
    enabled: true
    weight: 0.01
  gaussianity:
    enabled: false

alignment:
  weight: 0.1
  adaptive_weighting: true

training:
  max_steps: 200000

data:
  batch_size: 256

exp_name: "L2_latent_norm"
notes: "Latent ablation: LatentNormLoss (AIOTok) — soft constraint mean≈0 std≈1"

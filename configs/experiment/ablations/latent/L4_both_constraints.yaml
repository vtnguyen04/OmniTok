# @package _global_
# L4 — Latent Constraint Ablation: LatentNorm + Gaussianity combined
# Both constraints active — maximum regularization
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: dinov2
  - override /alignment: cosine
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  encoder:
    pretrained: true
  bottleneck:
    in_dim: 768
    latent_dim: 32
  decoder:
    z_channels: 32

loss:
  latent_norm:
    enabled: true
    weight: 0.01
  gaussianity:
    enabled: true
    weight: 0.1

alignment:
  student_dim: 768
  weight: 0.1
  adaptive_weighting: true

training:
  max_steps: 200000

data:
  batch_size: 256

exp_name: "L4_both_constraints"
notes: "Latent ablation: Both LatentNormLoss + GaussianityRegularization"
tags: ["tokenizer", "latent_ablation", "both_constraints"]

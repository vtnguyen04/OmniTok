# @package _global_
# L3 — Latent Constraint Ablation: GaussianityLoss (UNE style)
# MSE(Cov(z), I) — stronger constraint, ≈ whitening regularization
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: dinov2
  - override /alignment: cosine
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  encoder:
    pretrained: true
  bottleneck:
    in_dim: 768
    latent_dim: 32
  decoder:
    z_channels: 32

loss:
  latent_norm:
    enabled: false
  gaussianity:
    enabled: true
    weight: 0.1

alignment:
  student_dim: 768
  weight: 0.1
  adaptive_weighting: true

training:
  max_steps: 200000

data:
  batch_size: 256

exp_name: "L3_gaussianity"
notes: "Latent ablation: GaussianityRegularization (UNE theory) — constrains higher-order moments"
tags: ["tokenizer", "latent_ablation", "gaussianity_reg"]

# @package _global_
# T10 — Best config + Linear Projector (UNE hypothesis test)
defaults:
  - override /model/encoder: vit_large
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: multi_dino_siglip_sam
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  bottleneck:
    in_dim: 1024
    latent_dim: 32
  decoder:
    in_chans: 32

alignment:
  student_dim: 1024
  projector: "linear"

training:
  max_steps: 10000

data:
  batch_size: 2

exp_name: "T10_linear_projector"
notes: "Architecture ablation: Use simple Linear projector instead of ViTDecoder projector"
tags: ["tokenizer", "architecture_ablation", "linear_projector"]

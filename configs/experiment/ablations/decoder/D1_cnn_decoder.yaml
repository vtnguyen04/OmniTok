# @package _global_
# D1 — Decoder Ablation: CNN decoder (REPA-E/VA-VAE style)
# Compare CNN decoder (fast convergence, spatial inductive bias) vs ViT pixel decoder
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: linear
  - override /model/decoder: cnn_decoder
  - override /teacher: multi_dino_siglip_sam
  - override /alignment: cosine
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

model:
  encoder:
    pretrained: "dinov2_vitb14"
  decoder:
    z_channels: 32    # Must match encoder bottleneck dim

loss:
  latent_norm:
    enabled: true
    weight: 0.01
  gan:
    enabled: true
    disc_start: 5000
    disc_weight: 0.1
    lecam_weight: 0.01
    n_layers: 3

alignment:
  student_dim: 768
  weight: 0.1

training:
  max_steps: 20000
  log_every: 10
  save_every: 100
  grad_accum_steps: 2

scheduler:
  warmup_steps: 500

data:
  batch_size: 8

optimizer:
  lr: 5.0e-4
  lr_multipliers:
    "encoder": 0.01
    "decoder": 1.0

exp_name: "D1_cnn_decoder"
notes: "Decoder ablation: CNN decoder (REPA-E) + ViT encoder + cosine align + multi-teacher"
tags: ["tokenizer", "decoder_ablation", "cnn_decoder", "repa_e_style", "multi_teacher", "cosine_align"]

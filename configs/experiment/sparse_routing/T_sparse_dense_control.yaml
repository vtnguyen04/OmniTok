# @package _global_
# T_sparse_dense: Sparse Router with top-k=3 (Control — Dense Mode)
# When top_k == num_teachers, ALL teachers are selected every step.
# This is equivalent to the existing dense alignment loop but WITH the
# router overhead (gate computation + load balance loss).
#
# Purpose: Control experiment to isolate the effect of sparsity.
# If T_sparse_dense ≈ T4_moe_multiteacher → routing overhead is negligible.
# If T_sparse_top1 ≈ T_sparse_dense → sparsity doesn't hurt quality.
defaults:
  - override /model/encoder: vit_base
  - override /model/bottleneck: linear
  - override /model/decoder: pixel_decoder_base
  - override /teacher: multi_dino_siglip_sam
  - override /alignment: relational_kd
  - override /loss: standard
  - override /training: tokenizer_full
  - _self_

exp_name: "T_sparse_dense_control"

model:
  bottleneck:
    in_dim: 768
    latent_dim: 64
  decoder:
    in_chans: 64

alignment:
  student_dim: 768
  cos_weight: 1.0

teacher:
  routing:
    enabled: true
    type: sparse
    top_k: 3                    # Select ALL teachers (= dense, control)
    temperature: 1.0
    load_balance_weight: 0.01
    z_loss_weight: 0.001

loss:
  gan:
    enabled: true
    disc_start: 5000
    disc_weight: 0.1
    lecam_weight: 0.01
    n_layers: 3

training:
  max_steps: 20000
  use_adaptive_weighting: false
  log_every: 10
  save_every: 100

scheduler:
  warmup_steps: 500

data:
  batch_size: 2

optimizer:
  lr: 1.0e-4
  lr_multipliers:
    "encoder": 0.1
    "decoder": 1.0

notes: "Control: Sparse Router top_k=3 (ALL teachers selected = dense mode). Isolates routing overhead from sparsity effect."
tags: ["omnitok", "tokenizer", "sparse_routing", "dense_control"]

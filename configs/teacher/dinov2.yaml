# Single teacher: DINOv2-L (frozen)
# Feature dim: 1024, prefix_tokens=1 (CLS), 16x16=256 patch tokens
# @package teacher
enabled: true
names: ["dinov2"]
dinov2:
  model_name: "dinov2_vitl14"
  feature_dim: 1024
  freeze: true
  use_patch_tokens: true     # align on spatial patch tokens (not CLS)
  num_prefix_tokens: 1

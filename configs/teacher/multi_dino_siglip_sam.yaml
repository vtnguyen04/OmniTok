# Multi-teacher: DINOv3-L + SigLIP2-L + SAM-L with PHI-S
# T6 experiment — spatial + semantic + boundary awareness
# SAM features: dim=256, dense 64x64 tokens (pooled to 16x16 for alignment)
# @package teacher
enabled: true
names: ["dinov2", "siglip2", "sam"]
phi_s_balancing: true
dinov2:
  type: dinov2
  model_name: "dinov2_vits14"
  feature_dim: 384
  freeze: true
  use_patch_tokens: true
  num_prefix_tokens: 1
siglip2:
  type: siglip2
  model_name: "siglip2_vit_b16_256"
  feature_dim: 768
  freeze: true
  use_patch_tokens: true
  num_prefix_tokens: 0
sam:
  type: sam
  model_name: "sam_vit_b"
  feature_dim: 256
  freeze: true
  pool_to: 16    # pool 64x64 SAM features → 16x16 for alignment

# Multi-teacher: DINOv2-L + Depth Anything v2
# T7 experiment — novel teacher combination, depth not used before for tokenizers
# @package teacher
enabled: true
names: ["dinov2", "depth_anything"]
common_dim: 1024
phi_s_balancing: true
dinov2:
  model_name: "dinov2_vitl14"
  feature_dim: 1024
  freeze: true
  use_patch_tokens: true
  num_prefix_tokens: 1
depth_anything:
  model_name: "depth_anything_v2_vitl"
  feature_dim: 1024
  freeze: true
  use_patch_tokens: true
  num_prefix_tokens: 1

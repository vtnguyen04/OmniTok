# Full losses with GAN discriminator
# Used for T0 (VTP reproduce) and T_final
# @package loss
reconstruction:
  recon_type: "l1"
  recon_weight: 1.0
  perceptual_weight: 1.0

kl:
  weight: 1.0e-6

gan:
  enabled: true
  n_layers: 3
  disc_start: 5000        # steps before discriminator kicks in
  disc_weight: 0.5
  lecam_weight: 0.01       # LeCam regularization (from REPA-E)

gaussianity:
  enabled: false
  weight: 0.1

# ViT-Base encoder — default training scale
# @package model.encoder
type: "dinov3_bottleneck"
img_size: 256
patch_size: 16
embed_dim: 768
depth: 12
num_heads: 12
ffn_layer: "mlp"
norm_layer: "layernorm"
use_abs_pos_embed: true
use_rope: false
drop_path_rate: 0.1
layerscale_init: 1.0e-4
pretrained: null

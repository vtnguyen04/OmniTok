# CNN Encoder — ported from REPA-E / VA-VAE / LightningDiT
# Standard LDM-style encoder: ResBlock + GroupNorm + Swish + Attention + Downsample
# REPA-E f16d32 config: 256×256 image → 16×16 latent
# @package encoder
type: "cnn_encoder"
ch: 128                       # Base channel count (REPA-E default)
ch_mult: [1, 1, 2, 2, 4]     # Channel multipliers per level → 4 downsamples: 256→128→64→32→16
num_res_blocks: 2             # ResBlocks per level
attn_resolutions: [16]        # Self-attention at 16×16 resolution
dropout: 0.0
in_channels: 3                # RGB input
resolution: 256               # Input resolution
z_channels: 32                # Output latent channels
double_z: true                # Output 2×z_channels for VAE (mean+logvar)

# Pixel decoder — matches ViT-Base encoder
# @package model.decoder
type: "pixel_decoder"
in_chans: 256          # must match encoder.vit_feature_bottleneck
out_chans: 3
upscale_factor: 16    # must match encoder.patch_size
embed_dim: 768
depth: 12
num_heads: 12
ffn_layer: "mlp"
norm_layer: "layernorm"

# OmniTok — Primary Hydra Config
# Usage:
#   python train.py                                   # default (ViT-B, DINOv2, cosine)
#   python train.py +experiment=T0_vtp_baseline       # run specific experiment
#   python train.py model/encoder=vit_large           # override single group

defaults:
  - model/encoder: vit_base
  - model/bottleneck: linear
  - model/decoder: pixel_decoder_base
  - teacher: dinov2
  - alignment: cosine
  - loss: standard
  - training: tokenizer_full
  - optimizer: adamw
  - scheduler: cosine
  - data: imagenet
  - _self_
  - experiment: null

# --- Experiment identity ---
exp_name: "omnitok_default"
stage: "tokenizer"  # tokenizer | dit | e2e

# --- Output ---
output:
  dir: "outputs/${exp_name}"
  log_dir: "outputs/${exp_name}/logs"
  checkpoint_dir: "outputs/${exp_name}/checkpoints"
  results_dir: "outputs/${exp_name}/results"

# --- Hydra settings ---
hydra:
  run:
    dir: .
  sweep:
    dir: .
    subdir: .

defaults:
  - model/encoder: vit_base
  - model/decoder: pixel_decoder_base
  - teacher: dinov2
  - alignment: cosine
  - loss: standard
  - training: tokenizer_debug
  - experiment: null
  - _self_

# Common global variables that are not part of any config group can go here,
# but everything else is managed by the config groups and experiment configs.

# --- Data ---
data:
  root: "/path/to/imagenet/train"
  image_size: 256
  batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: false

# --- Optimizer ---
optimizer:
  type: "adamw"
  lr: 1e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]

# --- Scheduler ---
scheduler:
  type: "cosine"
  warmup_steps: 5000
  min_lr: 1e-6
